<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Bio Card</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      .stats,
      .social {
        flex-wrap: wrap;
      }

      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }

      a {
        text-decoration: none;
        color: inherit;
      }

      .escenario {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        max-width: 320px;
        width: 100%;
        margin: 1rem;
        padding: 2rem;
        background: #020617;
        border-radius: 1.5rem;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        text-align: center;
        min-height: 480px;
      }

      .avatar {
        font-size: 3rem;
      }

      .avatar img {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        object-fit: cover;
      }

      .name {
        font-size: 1.5rem;
        margin: 0;
      }

      .bio {
        margin: 0;
        opacity: 0.8;
      }

      .stats {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        width: 100%;
      }

      .stat {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.25rem;
      }

      .stat b {
        font-size: 1.1rem;
      }

      .stat span {
        font-size: 0.8rem;
        opacity: 0.7;
      }

      .links {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        width: 100%;
      }

      .link {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 0.8rem 1rem;
        border-radius: 1rem;
        background: #1f2937;
        font-size: 0.95rem;
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease,
          background 0.15s ease;
      }

      .link:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(15, 23, 42, 0.5);
        background: #111827;
      }

      .link.destacado {
        background: #4f46e5;
        color: #e5e7eb;
        font-weight: 600;
      }

      .link.destacado:hover {
        background: #6366f1;
      }

      .social {
        display: flex;
        justify-content: center;
        gap: 0.75rem;
      }

      .social a {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        width: 2rem;
        height: 2rem;
        border-radius: 50%;
        background: #dd0c3d;
        font-size: 0.75rem;
        transition:
          transform 0.15s ease,
          background 0.15s ease;
      }

      .social a:hover {
        transform: translateY(-1px);
        background: #111827;
      }

      .foot {
        margin-top: auto;
        font-size: 0.8rem;
        opacity: 0.7;
      }
    </style>
  </head>
  <body>
    <div class="escenario">
      <main class="card">
        <div class="avatar">
          <img src="foto-perfil-reducida.jpg" alt="Avatar de Zakkdruzer" />
        </div>
        <h1 class="name">José Ignacio Gajardo Soto</h1>
        <p class="bio">Solo muere quien se niega a aprender</p>
        <section class="stats">
          <div class="stat"><b>1.2k</b><span>Seguidores</span></div>
          <div class="stat"><b>34</b><span>Proyectos</span></div>
          <div class="stat"><b>8.9k</b><span>Likes</span></div>
        </section>
        <nav class="links">
          <a href="https://zakkdruzer.github.io/" class="link destacado"
            >🌟 Mi proyecto estrella (Mini-juego)</a
          >
          <a href="https://github.com/zakkdruzer" class="link">💼 Mi GitHub</a>
          <a href="https://www.instagram.com/jose_wajitz/" class="link"
            >📝 Instagram</a
          >
          <a href="#" class="link">📺 YouTube</a>
        </nav>
        <div class="social">
          <a href="#">IG</a><a href="#">X</a><a href="#">in</a
          ><a href="#">GH</a>
        </div>
        <footer class="foot">Hecho con 💙 y Flexbox</footer>
      </main>
    </div>
  </body>
</html>
