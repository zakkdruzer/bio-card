<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Bio Card</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      a {
        text-decoration: none;
        color: inherit;
      }

      .escenario {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      /* 🎨 ESCRIBE AQUÍ TU CSS CON FLEXBOX */
    </style>
  </head>
  <body>
    <div class="escenario">
      <main class="card">
        <div class="avatar">🦊</div>
        <h1 class="name">Tu Nombre</h1>
        <p class="bio">Una frase corta que te describa.</p>
        <section class="stats">
          <div class="stat"><b>1.2k</b><span>Seguidores</span></div>
          <div class="stat"><b>34</b><span>Proyectos</span></div>
          <div class="stat"><b>8.9k</b><span>Likes</span></div>
        </section>
        <nav class="links">
          <a href="#" class="link destacado">🌟 Mi proyecto estrella</a>
          <a href="#" class="link">💼 Portafolio</a>
          <a href="#" class="link">📝 Blog</a>
          <a href="#" class="link">📺 YouTube</a>
        </nav>
        <div class="social">
          <a href="#">IG</a><a href="#">X</a><a href="#">in</a
          ><a href="#">GH</a>
        </div>
        <footer class="foot">Hecho con 💙 y Flexbox</footer>
      </main>
    </div>
  </body>
</html>
